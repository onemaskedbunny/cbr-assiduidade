<!doctype html><html lang="pt"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CBR · QR Assiduidade</title><link rel="stylesheet" href="/cbr.css"></head><body><main class="center" style="display:block"><div style="width:min(760px,100%);margin:0 auto;padding-top:22px"><header class="pageHead"><img class="pageLogo" src="https://i.imgur.com/8mfDXWb.png" alt="CBR"><h1>Registo de Ponto</h1><p class="subtitle">QR Dinâmico · Válido durante 45 segundos</p></header><section class="card" style="text-align:center;width:100%"><div class="qrBox"><img id="qr" alt="QR dinâmico" style="width:100%;height:100%;object-fit:contain;border-radius:18px"></div><div class="bigClock" id="clock">--:--</div><p class="hint">Lê o código QR com o teu telemóvel pessoal autorizado. Se expirar, espera pelo próximo QR.</p><div class="row" style="justify-content:center"><span class="pill" id="status">A gerar QR…</span><span class="pill" id="countdown">5s</span><a class="pill" href="/index.html" style="text-decoration:none">← Início</a></div></section></div></main><script>
const qr=document.getElementById('qr'),statusEl=document.getElementById('status'),cd=document.getElementById('countdown'),clock=document.getElementById('clock');let remaining=5;
function tickClock(){clock.textContent=new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});}setInterval(tickClock,1000);tickClock();
async function newQr(){try{const r=await fetch('/api/qr/new', {method:'POST'});const data=await r.json();if(!r.ok)throw new Error(data.error||'Erro ao gerar QR');qr.src=data.qrDataUrl;statusEl.textContent='QR ativo';remaining=5;cd.textContent='5s';}catch(e){statusEl.textContent='Erro ao gerar QR';console.error(e)}}
setInterval(()=>{remaining=Math.max(0,remaining-1);cd.textContent=remaining+'s'},1000);newQr();setInterval(newQr,5000);
</script></body></html>
